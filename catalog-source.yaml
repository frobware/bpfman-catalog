apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: bpfman-dev-catalog
  namespace: openshift-marketplace
spec:
  sourceType: grpc
  image: quay.io/redhat-user-workloads/ocp-bpfman-tenant/catalog-ystream:latest
  displayName: BPFMan development catalog
  publisher: Me
  updateStrategy:
    registryPoll:
      interval: 1m